apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-telemetry-backend
  namespace: sidecar-lab
  labels:
    app.kubernetes.io/name: mock-telemetry-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-telemetry-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-telemetry-backend
    spec:
      containers:
        - name: backend
          image: mock-telemetry-backend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "16Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: mock-telemetry-backend
  namespace: sidecar-lab
spec:
  selector:
    app.kubernetes.io/name: mock-telemetry-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
