apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sidecar-lab-policy
  namespace: sidecar-lab
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: sidecar-lab
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permitir tráfego entre containers do mesmo Pod (localhost)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  egress:
    # Permitir acesso ao mock backend
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mock-telemetry-backend
      ports:
        - protocol: TCP
          port: 8080
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
